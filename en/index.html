<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTimes | Personal Productivity OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 30%, #1e1b4b 0%, #0f172a 50%, #020617 100%);
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(#ffffff 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05;
            z-index: 0;
        }

        .hero-section {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 95%;
            max-width: 1200px;
            padding: 40px 20px;
            animation: fadeIn 1.5s ease-out;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
            justify-content: center;
        }

        /* --- LOGO TASK --- */
        .logo-container {
            display: flex; justify-content: center; gap: clamp(10px, 2vw, 15px); margin-bottom: 20px;
        }
        .letter-box {
            width: clamp(50px, 8vw, 65px); height: clamp(50px, 8vw, 65px); 
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: clamp(1.2rem, 3vw, 1.5rem); font-weight: 800; background: rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
        }
        .letter-box:hover {
            transform: translateY(-12px) scale(1.15);
            background: #38bdf8;
            border-color: #38bdf8;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4);
        }

        /* --- CHỮ TIMES --- */
        .times-container {
            font-size: clamp(4rem, 15vw, 9.5rem); font-weight: 800; letter-spacing: -3px;
            line-height: 1; margin-bottom: 15px;
        }
        .times-letter {
            display: inline-block;
            transition: all 0.4s ease;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .times-letter:hover {
            transform: scale(1.1) translateY(-5px);
            -webkit-text-fill-color: #38bdf8;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6));
        }

        .status-tag {
            font-size: clamp(0.6rem, 2vw, 0.75rem); font-weight: 600; color: #38bdf8;
            text-transform: uppercase; letter-spacing: 5px; margin-bottom: 30px; display: block;
            animation: blinker 2s linear infinite;
        }

        .mission-desc {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem); color: #94a3b8; max-width: 600px; margin: 0 auto 40px;
            line-height: 1.6; font-weight: 300;
        }

        .btn-test-mode {
            padding: 16px 45px; background: #ffffff; color: #020617; border-radius: 100px;
            text-decoration: none; font-weight: 700; display: inline-flex; align-items: center;
            gap: 10px; transition: 0.3s; margin: 0 auto 60px; width: fit-content;
        }
        .btn-test-mode:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        /* --- FOOTER RESPONSIVE --- */
        .custom-footer {
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
            padding-top: 25px; 
            margin-top: auto;
            width: 100%;
        }

        .founder-box { display: flex; align-items: center; gap: 15px; text-align: left; }
        .avatar-img {
            width: clamp(55px, 10vw, 75px); height: clamp(55px, 10vw, 75px); border-radius: 50%;
            border: 2px solid rgba(56, 189, 248, 0.5); object-fit: cover;
            background: #0f172a; /* Màu nền dự phòng */
        }
        .role-label { 
            font-size: 0.65rem; color: #38bdf8; text-transform: uppercase; 
            letter-spacing: 2px; font-weight: 600; margin-bottom: 4px;
        }
        .founder-name { 
            font-size: clamp(1rem, 3vw, 1.25rem); font-weight: 700; color: #ffffff; 
            letter-spacing: 1px; line-height: 1.2;
        }
        
        .copyright-text {
            font-size: 0.6rem; color: rgba(148, 163, 184, 0.5);
            margin-top: 4px; letter-spacing: 0.5px;
        }

        .social-links { display: flex; gap: 18px; margin-top: 12px; }
        .social-link { color: rgba(148, 163, 184, 0.7); font-size: 1.3rem; text-decoration: none; transition: 0.3s; }
        .social-link:hover { color: #38bdf8; transform: translateY(-3px); }

        /* --- CLOCK RESPONSIVE --- */
        .datetime-box { text-align: right; display: flex; flex-direction: column; justify-content: flex-end; }
        #clock { 
            font-size: clamp(1.8rem, 5vw, 2.8rem); 
            font-weight: 800; color: #ffffff; 
            line-height: 1; margin-bottom: 5px;
            letter-spacing: 2px;
        }
        #date { 
            font-size: clamp(0.9rem, 2.5vw, 1.25rem); color: #94a3b8; font-weight: 500;
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blinker { 50% { opacity: 0.3; } }

        @media (max-width: 768px) {
            .custom-footer { 
                flex-direction: column; 
                gap: 40px; 
                text-align: center; 
                align-items: center;
                padding-bottom: 20px;
            }
            .founder-box { flex-direction: column; text-align: center; }
            .datetime-box { text-align: center; width: 100%; }
            .social-links { justify-content: center; }
            .hero-section { min-height: 95vh; }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="logo-container">
            <div class="letter-box">T</div><div class="letter-box">A</div>
            <div class="letter-box">S</div><div class="letter-box">K</div>
        </div>

        <div class="times-container">
            <span class="times-letter">T</span><span class="times-letter">i</span><span class="times-letter">m</span><span class="times-letter">e</span><span class="times-letter">s</span>
        </div>

        <span class="status-tag">Public release coming soon</span>
        
        <p class="mission-desc">
            The next-generation Personal Productivity OS. Seamlessly integrating tools, documents, and AI-driven insights.
        </p>

        <a href="/login" class="btn-test-mode">
            Enter TEST MODE &rarr;
        </a>

        <div class="custom-footer">
            <div class="founder-box">
                <img src="/en/ava-web.jpg" alt="Founder" class="avatar-img" onerror="this.src='https://raw.githubusercontent.com/nntuyenvn-lab/nntuyenvn-lab.github.io/main/en/ava-web.jpg'">
                <div class="founder-text">
                    <div class="role-label">Founder & Developer</div>
                    <div class="founder-name">NGUYEN NGOC TUYEN</div>
                    <div class="copyright-text">© 2025 - <span id="current-year"></span> TaskTimes. All rights reserved.</div>
                    <div class="social-links">
                        <a href="https://www.linkedin.com/in/tuyennguyenvn/" target="_blank" class="social-link" title="LinkedIn">
                            <i class="fab fa-linkedin"></i>
                        </a>
                        <a href="https://web.facebook.com/tuyen.nguyen.fb.vn/" target="_blank" class="social-link" title="Facebook">
                            <i class="fab fa-facebook"></i>
                        </a>
                        <a href="mailto:nntuyenvn@gmail.com" class="social-link" title="Email Me">
                            <i class="fas fa-envelope"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="datetime-box">
                <div id="clock">00:00:00</div>
                <div id="date">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB', { hour12: false });
            const options = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
            document.getElementById('current-year').textContent = now.getFullYear();
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>
</html>
