<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasktimes.asia - Clean Dark Mode</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@300;400;600&display=swap');

/* RESET CỨNG cho iframe Google Sites */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: white;
    background: #000;
}

/* FULL SCREEN CONTAINER */
.main-wrapper {
    width: 100vw;
    height: 100vh;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    position: relative;
}

/* DOMAIN TEXT */
.domain {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 900;
    letter-spacing: -2px;
    text-transform: lowercase;

    background: linear-gradient(180deg, #FFFFFF 30%, #A0A0A0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    filter: drop-shadow(0 4px 10px rgba(255, 255, 255, 0.12));
    animation: subtleFloat 4s ease-in-out infinite alternate;
}

@keyframes subtleFloat {
    from { transform: translateY(0); }
    to   { transform: translateY(-6px); }
}

/* INFO BAR */
.info-bar {
    position: absolute;
    bottom: 6vh;

    width: min(90%, 1200px);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;

    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.12);
}

.details-left {
    text-align: left;
}

.details-left h3 {
    font-size: 0.95rem;
    margin-bottom: 8px;
    color: #23d5ab;
    letter-spacing: 0.5px;
}

.details-left p {
    margin: 4px 0;
    font-size: 0.85rem;
    opacity: 0.7;
}

.details-left span {
    font-weight: 600;
    color: #fff;
}

/* TIME */
.time-right {
    text-align: right;
}

.current-date {
    font-size: 1rem;
    opacity: 0.75;
    margin-bottom: 6px;
}

.current-time {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(2.8rem, 6vw, 4rem);
    font-weight: 800;
    line-height: 1;
}

/* MOBILE FIX */
@media (max-width: 768px) {
    .info-bar {
        flex-direction: column;
        align-items: center;
        text-align: center;
        bottom: 4vh;
    }

    .details-left,
    .time-right {
        text-align: center;
        margin-bottom: 20px;
    }
}
</style>
</head>

<body>

<div class="main-wrapper">
    <h1 class="domain">tasktimes.asia</h1>

    <div class="info-bar">
        <div class="details-left">
            <h3>Location & Time</h3>
            <p><span>Time Zone:</span> Indochina Time (UTC+7)</p>
            <p><span>Location:</span> Hanoi, Vietnam</p>
        </div>

        <div class="time-right">
            <div class="current-date" id="date"></div>
            <div class="current-time" id="clock"></div>
        </div>
    </div>
</div>

<script>
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour12: true });
    document.getElementById('date').textContent =
        now.toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
