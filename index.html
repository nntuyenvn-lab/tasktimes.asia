<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskTimes</title>

<!-- Font đẹp -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        overflow: hidden;
    }

    /* Background glow */
    body::before {
        content: "";
        position: absolute;
        width: 400px;
        height: 400px;
        background: #00cfff;
        filter: blur(150px);
        opacity: 0.3;
        top: 10%;
        left: 10%;
    }

    .container {
        width: 100%;
        max-width: 380px;
        padding: 30px 25px;
        border-radius: 20px;
        backdrop-filter: blur(20px);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        text-align: center;
        color: white;
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .logo {
        font-size: 48px;
        font-weight: 600;
        letter-spacing: 5px;
    }

    .logo span {
        border: 2px solid #00cfff;
        border-radius: 50%;
        padding: 5px 10px;
        margin: 0 3px;
        display: inline-block;
        color: #00cfff;
    }

    .subtitle {
        margin: 15px 0 25px;
        color: #00cfff;
        font-size: 14px;
    }

    .input-box {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        margin-bottom: 15px;
        font-size: 14px;
        background: rgba(255,255,255,0.1);
        color: white;
    }

    .input-box::placeholder {
        color: #ccc;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #00cfff, #0072ff);
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(0, 207, 255, 0.5);
    }

    .text {
        font-size: 13px;
        color: #ddd;
        margin-top: 15px;
        line-height: 1.6;
    }

    .text a {
        color: #00cfff;
        text-decoration: none;
    }

    .text a:hover {
        text-decoration: underline;
    }

    .author {
        margin-top: 20px;
        font-size: 12px;
        color: #aaa;
    }

    /* Mobile */
    @media (max-width: 480px) {
        .logo {
            font-size: 36px;
        }

        .container {
            margin: 0 15px;
            padding: 25px 20px;
        }
    }

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <span>T</span><span>A</span><span>S</span><span>K</span>Times
    </div>

    <div class="subtitle">By invitation only</div>

    <input type="email" class="input-box" placeholder="Email*">

    <button class="btn">🔗 Request a magic link</button>

    <div class="text">
        For existing users, get started by requesting a magic link via email 
        or <a href="#">inputting password</a>
    </div>

    <div class="text">
        New account? <a href="#">Request an invite</a>
    </div>

    <div class="author">
        Created by Nguyen Ngoc Tuyen
    </div>

</div>
