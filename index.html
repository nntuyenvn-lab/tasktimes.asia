<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTimes | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e3c72 0%, #0f2027 100%);
            color: white; overflow: hidden;
        }
        .container {
            text-align: center; background: rgba(44, 62, 80, 0.5); padding: 50px 30px;
            border-radius: 25px; backdrop-filter: blur(15px); width: 90%; max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        .logo-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .circle {
            width: 40px; height: 40px; border: 2px solid #00d2ff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; font-weight: 600; color: #00d2ff;
        }
        .brand-name { font-size: 2.5rem; font-weight: 600; margin-bottom: 5px; letter-spacing: 1px; }
        .subtitle { font-size: 0.9rem; color: #00d2ff; margin-bottom: 30px; }
        .input-box {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: none;
            background: #fff; color: #333; text-align: center; font-size: 1rem; outline: none;
        }
        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px; background: #00a8ff;
            color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { background: #00d2ff; transform: translateY(-2px); }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .footer-links { margin-top: 25px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.7); line-height: 1.6; }
        .footer-links a { color: #00d2ff; text-decoration: none; cursor: pointer; }
        .operated-by { margin-top: 35px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.5px; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div id="login-page" class="container">
        <div class="logo-container">
            <div class="circle">T</div><div class="circle">A</div><div class="circle">S</div><div class="circle">K</div>
        </div>
        <div class="brand-name">TaskTimes</div>
        <div class="subtitle">By invitation only</div>
        
        <input type="email" id="user-email" class="input-box" placeholder="Email*">
        <button id="magic-btn" class="btn" onclick="handleMagicLink()">🔗 Request a magic link</button>
        
        <div class="footer-links">
            For existing users, get started by requesting a magic link via email or <a onclick="handlePasswordLogin()">inputting password</a><br>
            New account? <a href="#">Request an invite</a>
        </div>
        
        <div class="operated-by">Operated by Nguyen Ngoc Tuyen</div>
    </div>

    <div id="dashboard" class="container">
        <h2 id="welcome-msg">Welcome!</h2>
        <p style="margin: 20px 0; opacity: 0.7;">Your pro dashboard is ready.</p>
        <button class="btn" style="background: #e74c3c;" onclick="handleLogout()">Sign Out</button>
        <div class="operated-by">Operated by Nguyen Ngoc Tuyen</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyDxBNqqxoWr9nBMYujSXnqD-KnYPoOPMD0",
            authDomain: "tasktimes-vn.firebaseapp.com",
            projectId: "tasktimes-vn",
            storageBucket: "tasktimes-vn.firebasestorage.app",
            messagingSenderId: "561471525471",
            appId: "1:561471525471:web:45f9ec52ac1c2f1fa7c1ea",
            measurementId: "G-W2S1N7DH5F"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const updateURL = (path) => { window.history.pushState({}, "", path); };

        window.handleMagicLink = () => {
            const email = document.getElementById('user-email').value;
            const btn = document.getElementById('magic-btn');
            if(!email) return alert("Please enter your email!");
            btn.innerText = "Sending..."; btn.disabled = true;

            sendSignInLinkToEmail(auth, email, {
                url: window.location.origin + "/login",
                handleCodeInApp: true,
            })
            .then(() => {
                window.localStorage.setItem('emailForSignIn', email);
                alert("✨ Magic link sent! Check your email: " + email);
                btn.innerText = "🔗 Request a magic link"; btn.disabled = false;
            })
            .catch((error) => {
                alert("Error: " + error.message);
                btn.innerText = "🔗 Request a magic link"; btn.disabled = false;
            });
        };

        window.handlePasswordLogin = () => {
            alert("Password login feature is coming soon!");
        };

        window.handleLogout = () => signOut(auth).then(() => updateURL("/login"));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Hello, " + (user.displayName || user.email);
                if(window.location.pathname === "/login") updateURL("/");
            } else {
                document.getElementById('login-page').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
                if(window.location.pathname !== "/login") updateURL("/login");
            }
        });

        if (isSignInWithEmailLink(auth, window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Please provide your email for confirmation');
            signInWithEmailLink(auth, email, window.location.href)
                .then(() => { window.localStorage.removeItem('emailForSignIn'); updateURL("/"); })
                .catch((error) => alert(error.message));
        }
    </script>
</body>
</html>
