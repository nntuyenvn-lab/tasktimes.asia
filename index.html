<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCD | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e3c72 0%, #0f2027 100%);
            color: white; font-family: 'Poppins', sans-serif; overflow: hidden;
        }
        .container {
            text-align: center; background: rgba(44, 62, 80, 0.5); padding: 50px 30px;
            border-radius: 25px; backdrop-filter: blur(15px); width: 90%; max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        .logo-container { display: flex; justify-content: center; align-items: baseline; gap: 5px; margin-bottom: 25px; }
        .logo-text { font-family: 'Major Mono Display', monospace; font-size: 3rem; color: #fff; font-weight: normal; }
        .logo-small { font-family: 'Major Mono Display', monospace; font-size: 1.5rem; color: #fff; text-transform: lowercase; }
        
        .brand-name { font-size: 2.8rem; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px; color: #00d2ff; }
        .subtitle { font-size: 1.1rem; color: #00d2ff; margin-bottom: 35px; }
        
        .input-box {
            width: 100%; padding: 16px; margin-bottom: 18px; border-radius: 12px; border: none;
            background: #fff; color: #333; text-align: center; font-size: 1.1rem; outline: none;
        }
        .input-box::placeholder { color: #999; }
        
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px; background: #00a8ff;
            color: white; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:hover { background: #00d2ff; transform: translateY(-2px); }
        .btn:disabled { background: #555; cursor: not-allowed; }
        
        .footer-links { margin-top: 30px; font-size: 0.95rem; color: rgba(255, 255, 255, 0.7); line-height: 1.7; }
        .footer-links a { color: #00d2ff; text-decoration: none; cursor: pointer; font-weight: normal; }
        .operated-by { margin-top: 30px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.5px; }
        
        #dashboard { display: none; }
        .user-pic { width: 70px; border-radius: 50%; border: 2px solid #00d2ff; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-page" class="container">
        <div class="logo-container">
            <span class="logo-text">Gcd</span><span class="logo-small">ee</span>
        </div>
        <div class="brand-name">GCD</div>
        <div class="subtitle">By invitation only</div>
        
        <input type="email" id="user-email" class="input-box" placeholder="Email*">
        <button id="magic-btn" class="btn" onclick="handleMagicLink()">🔗 Request a magic link</button>
        
        <div class="footer-links">
            For existing users, get started by requesting a <br>
            magic link via email or <a onclick="handleGoogleLogin()">sign in with Google</a><br>
            New account? <a href="#">Request an invite</a>
        </div>
        
        <div class="operated-by">Operated by Nguyen Ngoc Tuyen</div>
    </div>

    <div id="dashboard" class="container">
        <img id="user-img" class="user-pic" src="" alt="">
        <h2 id="welcome-msg">Welcome!</h2>
        <p style="margin: 20px 0; opacity: 0.7;">Your pro dashboard is ready.</p>
        <button class="btn" style="background: #e74c3c;" onclick="handleLogout()">Sign Out</button>
        <div class="operated-by">Operated by Nguyen Ngoc Tuyen</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // CONFIG CHÍNH XÁC 100% TỪ FIREBASE CỦA BẠN
        const firebaseConfig = {
            apiKey: "AIzaSyDxBNqqxoWr9nBMYujSXnqD-KnYPoOPMD0",
            authDomain: "tasktimes-vn.firebaseapp.com",
            projectId: "tasktimes-vn",
            storageBucket: "tasktimes-vn.firebasestorage.app",
            messagingSenderId: "561471525471",
            appId: "1:561471525471:web:45f9ec52ac1c2f1fa7c1ea",
            measurementId: "G-W2S1N7DH5F"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const updateURL = (path) => { window.history.pushState({}, "", path); };

        // Gắn hàm vào window để gọi từ HTML
        window.handleMagicLink = () => {
            const email = document.getElementById('user-email').value;
            const btn = document.getElementById('magic-btn');
            if(!email) return alert("Please enter your email!");
            btn.innerText = "Sending..."; btn.disabled = true;

            sendSignInLinkToEmail(auth, email, {
                url: window.location.origin + "/login",
                handleCodeInApp: true,
            })
            .then(() => {
                window.localStorage.setItem('emailForSignIn', email);
                alert("✨ Success! Check email: " + email);
                btn.innerText = "🔗 Request a magic link"; btn.disabled = false;
            })
            .catch((error) => {
                alert("Firebase Error: " + error.message);
                btn.innerText = "🔗 Request a magic link"; btn.disabled = false;
            });
        };

        window.handleGoogleLogin = () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch((e) => alert(e.message));
        };

        window.handleLogout = () => signOut(auth).then(() => updateURL("/login"));

        onAuthStateChanged(auth, (user) => {
            const loginPage = document.getElementById('login-page');
            const dashboard = document.getElementById('dashboard');
            if (user) {
                loginPage.style.display = 'none';
                dashboard.style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Hello, " + (user.displayName || user.email);
                document.getElementById('user-img').src = user.photoURL || '';
                if(window.location.pathname === "/login") updateURL("/");
            } else {
                loginPage.style.display = 'block';
                dashboard.style.display = 'none';
                if(window.location.pathname !== "/login") updateURL("/login");
            }
        });

        if (isSignInWithEmailLink(auth, window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Confirm email:');
            signInWithEmailLink(auth, email, window.location.href)
                .then(() => { window.localStorage.removeItem('emailForSignIn'); updateURL("/"); })
                .catch((error) => alert(error.message));
        }
    </script>
</body>
</html>
