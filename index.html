<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTimes | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }
        /* Logo TASK lớn theo phong cách d65d42 */
        .logo-text {
            font-size: 5.5rem;
            font-weight: 800;
            line-height: 0.9;
            margin-bottom: 10px;
            letter-spacing: -3px;
            background: linear-gradient(to bottom, #ffffff 60%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #38bdf8;
            font-size: 0.95rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        /* Input fields trắng tinh khôi theo d5d67e */
        .input-container {
            position: relative;
            margin-bottom: 15px;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            outline: none;
            background: #ffffff;
            color: #1e293b;
        }
        .input-field::placeholder { color: #94a3b8; }
        /* Icon con mắt gạch chéo theo d65d42 */
        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #1e293b;
            display: flex;
        }
        .error-text {
            color: #ef4444;
            font-size: 0.85rem;
            text-align: left;
            margin: -10px 0 15px 5px;
            display: none; /* Mặc định ẩn */
        }
        .forgot-link {
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 30px;
        }
        .forgot-link:hover { text-decoration: underline; }
        /* Nút Sign In màu xanh teal theo d5d67e */
        .btn-signin {
            width: 100%;
            padding: 14px;
            background: #1e7a8a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-signin:hover { background: #16606d; }
        .footer-text {
            margin-top: 35px;
            font-size: 0.85rem;
            line-height: 1.8;
            color: #cbd5e1;
        }
        .footer-text a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 class="logo-text">TASK</h1>
        <p class="subtitle">By invitation only</p>

        <div class="input-container">
            <input type="email" id="email" class="input-field" placeholder="Email*">
        </div>

        <div class="input-container">
            <input type="password" id="password" class="input-field" placeholder="Password*">
            <span class="eye-icon" id="toggleEye">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
            </span>
        </div>
        <div id="error-msg" class="error-text">Missing password</div>

        <a href="#" class="forgot-link">Forgot password?</a>

        <button class="btn-signin" id="signInBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/>
            </svg>
            Sign in
        </button>

        <div class="footer-text">
            For existing users, get started by inputting email and password or <a href="#">requesting magic link</a><br>
            New account? <a href="request.html">Request an invite</a>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
