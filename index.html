<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTimes | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white; overflow: hidden;
        }
        .container {
            text-align: center; background: rgba(30, 41, 59, 0.5); padding: 50px 35px;
            border-radius: 28px; backdrop-filter: blur(15px); width: 95%; max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* LOGO TASK TO VÀ ĐẸP */
        .logo-container { 
            display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; 
        }
        .circle {
            width: 55px; height: 55px; border: 3px solid #38bdf8; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.6rem; font-weight: 800; color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }
        .brand-name { font-size: 3.5rem; font-weight: 700; margin-bottom: 5px; letter-spacing: -1px; }
        .subtitle { font-size: 0.9rem; color: #38bdf8; margin-bottom: 35px; letter-spacing: 1px; }

        /* INPUT FIELDS TRẮNG HIỆN ĐẠI */
        .input-group { position: relative; margin-bottom: 15px; }
        .input-field {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: #ffffff; color: #1e293b; font-size: 1rem; outline: none;
        }
        .eye-icon {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #1e293b; display: flex;
        }

        /* ERROR MESSAGE */
        .error-text {
            color: #ef4444; font-size: 0.85rem; text-align: left;
            margin: -10px 0 15px 5px; display: none;
        }

        /* BUTTONS */
        .btn-signin {
            width: 100%; padding: 15px; border: none; border-radius: 10px; background: #1e7a8a;
            color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.1rem;
        }
        .btn-signin:hover { background: #16606d; transform: translateY(-2px); }

        .footer-links { margin-top: 30px; font-size: 0.85rem; color: #94a3b8; line-height: 1.8; }
        .footer-links a { color: #38bdf8; text-decoration: none; font-weight: 600; cursor: pointer; }
        
        .operated-by { margin-top: 35px; font-size: 0.75rem; color: rgba(148, 163, 184, 0.3); }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <div class="circle">T</div><div class="circle">A</div><div class="circle">S</div><div class="circle">K</div>
        </div>
        <div class="brand-name">Times</div>
        <div class="subtitle">By invitation only</div>
        
        <div class="input-group">
            <input type="email" id="email" class="input-field" placeholder="Email*">
        </div>

        <div class="input-group">
            <input type="password" id="password" class="input-field" placeholder="Password*">
            <span class="eye-icon" id="toggleEye">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
            </span>
        </div>
        <div id="error-msg" class="error-text">Missing password</div>

        <a href="#" style="color:#38bdf8; text-decoration:none; font-size:0.9rem; display:block; margin-bottom:20px;">Forgot password?</a>

        <button class="btn-signin" id="signInBtn">Sign in</button>
        
        <div class="footer-links">
            For existing users, get started by inputting email and password or <a href="#">requesting magic link</a><br>
            New account? <a href="request.html">Request an invite</a>
        </div>
        
        <div class="operated-by">Operated by Nguyen Ngoc Tuyen</div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
