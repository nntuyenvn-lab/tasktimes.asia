<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTimes | Join Waiting List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e3c72 0%, #0f2027 100%);
            color: white; overflow: hidden;
        }

        /* Giao diện Modal Card */
        .modal-card {
            background: #0d1b2a; padding: 40px; border-radius: 12px;
            width: 95%; max-width: 480px; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .close-btn {
            position: absolute; top: 15px; right: 20px; font-size: 28px;
            color: #fff; cursor: pointer; text-decoration: none; opacity: 0.7;
        }
        .close-btn:hover { opacity: 1; }

        /* Logo TASK Times đẹp hơn */
        .logo-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 10px; }
        .circle {
            width: 45px; height: 45px; border: 2px solid #00d2ff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.3rem; font-weight: 700; color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }
        .brand-name { font-size: 2.5rem; font-weight: 700; margin-bottom: 25px; color: #fff; }

        h2 { font-size: 1.4rem; margin-bottom: 25px; font-weight: 600; text-align: left; }
        
        /* Form Inputs */
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: #fff; }
        .input-box {
            width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid #ddd;
            background: #fff; color: #333; font-size: 1rem; outline: none;
        }

        .checkbox-group { 
            display: flex; gap: 10px; text-align: left; margin-top: 20px; 
            font-size: 0.85rem; line-height: 1.4; align-items: flex-start;
        }
        .checkbox-group input { width: 16px; height: 16px; cursor: pointer; margin-top: 3px; }
        .checkbox-group a { color: #00d2ff; text-decoration: none; }
        
        .submit-btn {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            background: #006d77; color: white; font-weight: 600; font-size: 1rem;
            cursor: pointer; margin-top: 25px; transition: 0.3s;
        }
        .submit-btn:hover { background: #00818a; }

        #status-msg { margin-top: 20px; font-size: 0.95rem; font-weight: 500; }
    </style>
</head>
<body>

    <div class="modal-card">
        <a href="index.html" class="close-btn">&times;</a>
        
        <div class="logo-container">
            <div class="circle">T</div><div class="circle">A</div><div class="circle">S</div><div class="circle">K</div>
        </div>
        <div class="brand-name">Times</div>

        <h2>Join the waiting list</h2>
        
        <div class="input-group">
            <label>Full name*</label>
            <input type="text" id="full-name" class="input-box" placeholder="Enter your full name">
        </div>

        <div class="input-group">
            <label>Email*</label>
            <input type="email" id="email" class="input-box" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Your address*</label>
            <input type="text" id="address" class="input-box" placeholder="Enter your current address">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms-check">
            <label for="terms-check">
                I have read & accepted the <a href="#">terms & conditions</a>, 
                <a href="#">privacy policy</a> and <a href="#">cookie policy</a>.
            </label>
        </div>

        <button id="btn-submit" class="submit-btn" onclick="handleSubmit()">Submit</button>
        <div id="status-msg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxbNqqxoWr9nBMYujSXnqD-KnYPoOPMd0", 
            authDomain: "tasktimes-vn.firebaseapp.com",
            projectId: "tasktimes-vn",
            storageBucket: "tasktimes-vn.firebasestorage.app",
            messagingSenderId: "561471525471",
            appId: "1:561471525471:web:45f9ec52ac1c2f1fa7c1ea",
            measurementId: "G-W2S1N7DHSF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.handleSubmit = async () => {
            const name = document.getElementById('full-name').value;
            const email = document.getElementById('email').value;
            const address = document.getElementById('address').value;
            const terms = document.getElementById('terms-check').checked;
            const msgEl = document.getElementById('status-msg');
            const btn = document.getElementById('btn-submit');

            if (!name || !email || !address) return alert("Please fill all fields!");
            if (!terms) return alert("Please accept the terms!");

            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "inviteRequests"), {
                    fullName: name,
                    email: email,
                    address: address,
                    status: "pending",
                    timestamp: serverTimestamp()
                });

                msgEl.innerText = "✨ Success! Your request has been sent.";
                msgEl.style.color = "#2ecc71";
                btn.innerText = "Redirecting...";

                // Tự động quay về trang Login sau 2 giây
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2000); 

            } catch (e) {
                msgEl.innerText = "❌ Error: " + e.message;
                msgEl.style.color = "#e74c3c";
                btn.disabled = false;
                btn.innerText = "Submit";
            }
        };
    </script>
</body>
</html>
