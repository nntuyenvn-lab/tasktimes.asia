<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTimes | Join Waiting List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e3c72 0%, #0f2027 100%);
            color: white; overflow: hidden;
        }
        /* Giao diện Modal giống hình mẫu */
        .modal-card {
            background: #0d1b2a; padding: 40px; border-radius: 12px;
            width: 95%; max-width: 450px; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .close-btn {
            position: absolute; top: 15px; right: 20px; font-size: 28px;
            color: #fff; cursor: pointer; text-decoration: none; opacity: 0.7;
        }
        .close-btn:hover { opacity: 1; }
        h2 { font-size: 1.6rem; margin-bottom: 30px; font-weight: 600; text-align: left; }
        
        .input-group { text-align: left; margin-bottom: 22px; }
        label { display: block; margin-bottom: 10px; font-size: 0.95rem; font-weight: 600; color: #fff; }
        
        .input-box {
            width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #ddd;
            background: #fff; color: #333; font-size: 1rem; outline: none;
        }
        .input-box::placeholder { color: #999; }

        .checkbox-group { 
            display: flex; gap: 12px; text-align: left; margin-top: 25px; 
            font-size: 0.85rem; line-height: 1.5; align-items: flex-start;
        }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; margin-top: 3px; }
        .checkbox-group a { color: #00d2ff; text-decoration: none; }
        
        .submit-btn {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            background: #006d77; color: white; font-weight: 600; font-size: 1.1rem;
            cursor: pointer; margin-top: 30px; transition: 0.3s;
        }
        .submit-btn:hover { background: #00818a; }
        #status-msg { margin-top: 20px; font-size: 0.95rem; text-align: center; }
    </style>
</head>
<body>

    <div class="modal-card">
        <a href="index.html" class="close-btn">&times;</a>
        
        <h2>Join the waiting list</h2>
        
        <div class="input-group">
            <label>Full name*</label>
            <input type="text" id="full-name" class="input-box" placeholder="Enter your full name">
        </div>

        <div class="input-group">
            <label>Email*</label>
            <input type="email" id="email" class="input-box" placeholder="Enter your business email">
        </div>

        <div class="input-group">
            <label>Your address*</label>
            <input type="text" id="address" class="input-box" placeholder="Enter your current address">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms-check">
            <label for="terms-check">
                I have read & accepted the <a href="#">terms & conditions</a>, 
                <a href="#">privacy policy</a> and <a href="#">cookie policy</a>.
            </label>
        </div>

        <button id="btn-submit" class="submit-btn" onclick="handleSubmit()">Submit</button>
        <div id="status-msg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Cấu hình từ ảnh image_d41e4b.png của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyDxbNqqxoWr9nBMYujSXnqD-KnYPoOPMd0", 
            authDomain: "tasktimes-vn.firebaseapp.com",
            projectId: "tasktimes-vn",
            storageBucket: "tasktimes-vn.firebasestorage.app",
            messagingSenderId: "561471525471",
            appId: "1:561471525471:web:45f9ec52ac1c2f1fa7c1ea",
            measurementId: "G-W2S1N7DHSF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.handleSubmit = async () => {
            const name = document.getElementById('full-name').value;
            const email = document.getElementById('email').value;
            const address = document.getElementById('address').value;
            const terms = document.getElementById('terms-check').checked;
            const msgEl = document.getElementById('status-msg');
            const btn = document.getElementById('btn-submit');

            if (!name || !email || !address) return alert("Please fill all fields!");
            if (!terms) return alert("Please accept the terms!");

            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "inviteRequests"), {
                    fullName: name,
                    email: email,
                    address: address,
                    status: "pending",
                    timestamp: serverTimestamp()
                });
                msgEl.innerText = "✨ Success! Your request has been sent.";
                msgEl.style.color = "#2ecc71";
                btn.innerText = "Submit";
                btn.disabled = false;
            } catch (e) {
                msgEl.innerText = "❌ Error: " + e.message;
                msgEl.style.color = "#e74c3c";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
