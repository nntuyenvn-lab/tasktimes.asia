<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTimes | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white; overflow: hidden;
        }
        .container {
            text-align: center; background: rgba(30, 41, 59, 0.5); padding: 50px 35px;
            border-radius: 28px; backdrop-filter: blur(15px); width: 95%; max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .logo-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .circle {
            width: 55px; height: 55px; border: 3px solid #38bdf8; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.6rem; font-weight: 800; color: #38bdf8;
        }
        .brand-name { font-size: 3.5rem; font-weight: 700; margin-bottom: 5px; letter-spacing: -1px; }
        .subtitle { font-size: 0.9rem; color: #38bdf8; margin-bottom: 35px; letter-spacing: 1px; }
        .input-box {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: none;
            background: rgba(255, 255, 255, 0.1); color: #fff; text-align: center; font-size: 1rem; outline: none;
            border: 1px solid rgba(255, 255, 255, 0.2); transition: 0.3s;
        }
        .input-box:focus { border-color: #38bdf8; }
        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 10px; background: #0284c7;
            color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { background: #0ea5e9; transform: translateY(-2px); }
        .footer-links { margin-top: 30px; font-size: 0.85rem; color: #94a3b8; }
        .footer-links a { color: #38bdf8; text-decoration: none; font-weight: 600; cursor: pointer; }
        .back-home { margin-top: 25px; display: block; color: #64748b; text-decoration: none; font-size: 0.8rem; }
        .operated-by { margin-top: 35px; font-size: 0.75rem; color: rgba(148, 163, 184, 0.3); }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div id="login-page" class="container">
        <div class="logo-container">
            <div class="circle">T</div><div class="circle">A</div><div class="circle">S</div><div class="circle">K</div>
        </div>
        <div class="brand-name">Times</div>
        <div class="subtitle">By invitation only</div>
        
        <input type="email" id="user-email" class="input-box" placeholder="Email*">
        <button id="magic-btn" class="btn" onclick="handleMagicLink()">🔗 Request a magic link</button>
        
        <div class="footer-links">
            Existing users? <a onclick="handleGoogleSignIn()">Sign in with Google</a><br>
            New account? <a href="/request.html">Request an invite</a>
        </div>
        
        <a href="/en" class="back-home">← Back to Home</a>
        <div class="operated-by">Operated by Nguyen Ngoc Tuyen</div>
    </div>

    <div id="dashboard" class="container">
        <h2 id="welcome-msg">Welcome!</h2>
        <button class="btn" style="background: #ef4444; margin-top: 20px;" onclick="handleLogout()">Sign Out</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxbNqqxoWr9nBMYujSXnqD-KnYPoOPMd0", 
            authDomain: "tasktimes-vn.firebaseapp.com",
            projectId: "tasktimes-vn",
            storageBucket: "tasktimes-vn.firebasestorage.app",
            messagingSenderId: "561471525471",
            appId: "1:561471525471:web:45f9ec52ac1c2f1fa7c1ea",
            measurementId: "G-W2S1N7DHSF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // HÀM XỬ LÝ CHÍNH: Gửi link và quay về trang chủ
        window.handleMagicLink = () => {
            const email = document.getElementById('user-email').value;
            if(!email) return alert("Please enter your email!");
            
            sendSignInLinkToEmail(auth, email, {
                url: window.location.origin + '/login',
                handleCodeInApp: true,
            }).then(() => {
                window.localStorage.setItem('emailForSignIn', email);
                
                // 1. Hiển thị thông báo thành công
                alert("Success! Check your email."); 
                
                // 2. Sau khi nhấn OK, trình duyệt thực hiện dòng dưới đây:
                window.location.href = "/en"; 
            }).catch(err => alert(err.message));
        };

        window.handleGoogleSignIn = () => {
            signInWithPopup(auth, provider).catch((error) => alert(error.message));
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Hello, " + (user.displayName || user.email);
            } else {
                document.getElementById('login-page').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        if (isSignInWithEmailLink(auth, window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Confirm email:');
            signInWithEmailLink(auth, email, window.location.href)
                .then(() => { window.localStorage.removeItem('emailForSignIn'); })
                .catch((error) => alert(error.message));
        }
    </script>
</body>
</html>
